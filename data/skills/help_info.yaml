# 技能：帮助与功能介绍
name: help_info
description: 显示平台功能帮助信息和使用指引
min_role: guest
priority: 5
category: help
intent_keywords:
  - 帮助
  - help
  - 功能
  - 你能做什么
  - 你可以做什么
  - 有什么功能
  - 使用帮助
handler:
  type: static
  static_text: |
    **博爱医药AI智能管理平台 功能一览**

    📁 **文件操作**: 读写文件、搜索代码、批量编辑
    💾 **数据库查询**: 查询用户、部门、策略等业务数据
    📋 **请假管理**: 申请请假、审批流程、查看记录
    📊 **策略管理**: 创建和查询管理策略
    🌐 **网页搜索**: 搜索互联网信息

    **快捷查询**（秒级响应）:
      • "公司有多少人" — 查看用户统计
      • "有哪些部门" — 查看部门列表
      • "谁在线" — 查看活跃用户
      • "我的信息" — 查看个人账号信息

    直接输入你的问题即可，我会尽力帮你解决！
