# 技能：审批流程说明
name: approval_flow
description: 说明请假审批层级和流程
min_role: guest
priority: 9
category: policy
intent_patterns:
  - (审批|审核).*(流程|层级|是谁|谁审批|谁审核)
  - (请假|休假).*(谁审批|谁审核|审批.*谁|审核.*谁|审批人|审核人)
  - (上级|领导|主管).*(是谁|哪个|什么)
intent_keywords:
  - 审批流程
  - 审批层级
  - 谁审批
  - 审批人
  - 审批链
handler:
  type: static
  static_text: |
    **请假审批层级说明**

    公司采用逐级审批制度，请假申请由直接上级审批：

    | 申请角色 | 审批人角色 |
    |----------|------------|
    | 职员 (staff) | 部门长 (dept_head) |
    | 部门长 (dept_head) | 总经理 (gm) |
    | 总经理 (gm) | 董事长 (chairman) |
    | 董事长 (chairman) | 超级管理员 (super_admin) |

    **操作方式**：
    1. 使用 `申请请假` 功能提交请假申请
    2. 审批人会收到待办通知
    3. 审批人使用 `审批请假` 功能进行处理
    4. 审批通过后请假生效

    如不清楚自己的上级是谁，可以问"我的审批人是谁"。
