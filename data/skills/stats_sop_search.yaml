# 技能：SOP文档搜索
name: sop_search
description: 按关键词/部门/编号搜索标准操作规程
min_role: guest
priority: 9
category: sop
intent_patterns:
  - (搜索|查|找|查看|查查|找找).*(SOP|标准操作|操作规程|操作流程|规程)
  - (SOP|标准操作|操作规程|操作流程).*(搜索|查|找|查看|在哪|有哪些|哪个)
  - (什么|哪个|哪些).*(SOP|标准操作|操作规程)
intent_keywords:
  - SOP
  - 操作规程
  - 标准操作
  - 标准操作规程
  - 操作流程
  - 规程
handler:
  type: function
  function: agent.skill_registry_handlers.search_sop
