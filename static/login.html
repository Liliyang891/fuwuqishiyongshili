<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 博爱医药</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --green: #4bb42d;
    --green-dark: #3a8a22;
    --green-light: #e8f5e0;
    --green-pale: #f4faf0;
    --text: #2d3748;
    --text-light: #5a6b7a;
    --white: #ffffff;
    --border: #e2e8e8;
}
body {
    background: linear-gradient(180deg, #f4faf0 0%, #ffffff 50%, #f9fafb 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
    -webkit-font-smoothing: antialiased;
}
.login-card {
    background: var(--white);
    border-radius: 20px; padding: 44px 40px 36px;
    width: 400px; max-width: 90vw;
    box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
    text-align: center;
}
.logo-img { height: 32px; width: auto; margin-bottom: 28px; }
.login-card h2 { font-size: 22px; color: #1a3a1a; margin-bottom: 6px; font-weight: 700; }
.login-card .subtitle { color: var(--text-light); font-size: 13px; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; text-align: left; }
.form-group label { display: block; font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 6px; }
.form-group input {
    width: 100%; padding: 11px 14px;
    background: #f9faf9; border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; outline: none;
    transition: all 0.2s;
}
.form-group input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(75,180,45,0.08);
    background: #fff;
}
.form-group input::placeholder { color: #b0c0b0; }
.remember-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px; font-size: 13px;
}
.remember-row label { color: var(--text-light); cursor: pointer; }
.remember-row a { color: var(--green); text-decoration: none; font-weight: 500; }
.btn-login {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 2px 12px rgba(75,180,45,0.25);
}
.btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(75,180,45,0.35);
}
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.error-msg { color: #dc2626; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
.register-link { text-align: center; font-size: 13px; color: var(--text-light); margin-top: 18px; }
.register-link a { color: var(--green-dark); text-decoration: none; font-weight: 600; }
.register-link a:hover { color: var(--green); }
.back-home { display: block; text-align: center; margin-top: 14px; font-size: 12px; color: var(--text-light); text-decoration: none; }
.back-home:hover { color: var(--green); }

@media (max-width: 480px) {
    .login-card { padding: 32px 24px 28px; }
}
</style>
</head>
<body>
<div class="login-card">
    <img class="logo-img" src="/static/img/logo-text.png" alt="博爱医药">
    <h2>登录</h2>
    <p class="subtitle">登录博爱医药 AI 管理平台</p>
    <div class="form-group">
        <label>用户名或邮箱</label>
        <input type="text" id="login" placeholder="请输入用户名或邮箱" autocomplete="username">
    </div>
    <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div class="remember-row">
        <label><input type="checkbox" id="remember"> 记住我</label>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">登  录</button>
    <div class="error-msg" id="error"></div>
    <div class="register-link">还没有账号？<a href="/register">立即注册</a></div>
    <a class="back-home" href="/">← 返回首页</a>
</div>
<script>
async function doLogin() {
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('btnLogin');

    if (!login || !password) {
        errorEl.textContent = '请输入用户名和密码';
        return;
    }
    btn.disabled = true; btn.textContent = '登录中...'; errorEl.textContent = '';

    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password, remember_me: remember }),
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = '/chat/';
        } else {
            errorEl.textContent = data.error || '登录失败';
        }
    } catch (e) {
        console.error('Login error:', e);
	        errorEl.textContent = '请求失败：' + (e.message || '网络错误，请检查连接');
    } finally {
        btn.disabled = false; btn.textContent = '登  录';
    }
}

document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
document.getElementById('login').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
