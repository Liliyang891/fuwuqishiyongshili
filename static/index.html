<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 — 博爱医药</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #4bb42d;
            --green-dark: #3a8a22;
            --green-light: #e8f5e0;
            --green-pale: #f4faf0;
            --text: #2d3748;
            --text-light: #5a6b7a;
            --white: #ffffff;
            --border: #e2e8e8;
            --radius: 14px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7f5;
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%; max-width: 720px; height: 95vh;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* ====== Header ====== */
        .header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 14px;
            flex-shrink: 0;
        }
        .header .logo-icon-img {
            height: 42px; width: auto;
            border-radius: 8px;
        }
        .header .title-group { flex: 1; }
        .header .title { font-size: 16px; font-weight: 700; color: #1a3a1a; }
        .header .subtitle { font-size: 11px; color: var(--text-light); }
        .header .status {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-light);
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green); animation: pulse 2s infinite;
        }
        .status-dot.offline { background: #ef4444; animation: none; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ====== User Bar ====== */
        .user-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 24px; background: var(--green-pale);
            border-bottom: 1px solid var(--border); font-size: 13px;
            flex-shrink: 0;
        }
        .user-bar .user-info { display: flex; align-items: center; gap: 8px; }
        .user-bar .user-info strong { color: #1a3a1a; }
        .role-badge {
            padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600;
        }
        .role-super_admin { background: #fbbf24; color: #000; }
        .role-chairman { background: #60a5fa; color: #000; }
        .role-gm { background: #818cf8; color: #000; }
        .role-dept_head { background: #34d399; color: #000; }
        .role-staff { background: #a78bfa; color: #000; }
        .role-guest { background: #d1d5db; color: #374151; }
        .user-bar .bar-actions { display: flex; gap: 8px; align-items: center; }
        .btn-admin {
            padding: 4px 12px; background: #fbbf24; color: #000;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600; text-decoration: none;
        }
        .btn-logout {
            padding: 4px 12px; background: #fee2e2; color: #dc2626;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600;
        }
        .btn-logout:hover { background: #fecaca; }
        .btn-edit-profile {
            padding: 4px 12px; background: #e8f5e0; color: var(--green-dark);
            border: 1px solid rgba(75,180,45,0.2); border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600;
        }
        .btn-edit-profile:hover { background: #d4edc9; }

        /* ====== Modal ====== */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            background: var(--white); border-radius: 16px; padding: 32px;
            width: 400px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }
        .modal-card h3 { font-size: 18px; color: #1a3a1a; margin-bottom: 20px; text-align: center; }
        .modal-card .form-group { margin-bottom: 14px; text-align: left; }
        .modal-card .form-group label { display: block; font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 5px; }
        .modal-card .form-group label .optional { color: var(--text-light); font-weight: 400; }
        .modal-card .form-group input {
            width: 100%; padding: 10px 14px; border-radius: 10px;
            border: 1px solid var(--border); background: #f9faf9;
            color: var(--text); font-size: 14px; outline: none;
            transition: all 0.2s;
        }
        .modal-card .form-group input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(75,180,45,0.08);
            background: #fff;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-actions button {
            padding: 10px 24px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-save {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff; box-shadow: 0 2px 12px rgba(75,180,45,0.25);
        }
        .btn-save:hover { transform: translateY(-1px); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-cancel { background: #f3f4f6; color: var(--text); }
        .btn-cancel:hover { background: #e5e7eb; }
        .modal-error { color: #dc2626; font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
        .modal-success { color: #4bb42d; font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }

        /* ====== Chat Area ====== */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
            background: #fafcfa;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #d1d5d1; border-radius: 10px; }

        .empty-hint {
            text-align: center; padding: 50px 20px; color: #9ab09a;
            margin: auto;
        }
        .empty-hint .hint-logo {
            height: 80px; width: auto; margin: 0 auto 20px;
            opacity: 0.3; display: block;
        }

        .message { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message .label {
            font-size: 11px; font-weight: 600; margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .message.user { text-align: right; }
        .message.user .label { color: var(--green-dark); }
        .message.server .label { color: var(--text-light); }
        .message .bubble {
            display: inline-block; padding: 10px 16px; border-radius: 14px;
            font-size: 14px; line-height: 1.65; max-width: 85%;
            word-break: break-word; white-space: pre-wrap; text-align: left;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff; border-bottom-right-radius: 4px;
        }
        .message.server .bubble {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text); border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .message .time { font-size: 10px; color: #a0b0a0; margin-top: 3px; }
        .message .extra { font-size: 10px; color: #f59e0b; margin-top: 2px; }

        /* ====== Upload Preview ====== */
        .upload-preview {
            display: none; margin: 0 24px; padding: 8px 14px;
            background: var(--green-pale); border-radius: 8px;
            color: var(--green-dark); font-size: 12px;
            border: 1px solid rgba(75,180,45,0.2);
        }
        .upload-preview.show { display: block; }

        /* ====== Toolbar ====== */
        .toolbar {
            padding: 10px 24px; display: flex; align-items: center;
            gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--border);
        }
        .toolbar label { color: var(--text-light); font-size: 12px; white-space: nowrap; }
        .toolbar select {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--white); color: var(--text); font-size: 13px;
            outline: none; cursor: pointer; transition: border-color 0.2s;
        }
        .toolbar select:focus { border-color: var(--green); }
        .clear-btn {
            margin-left: auto; padding: 6px 14px; border-radius: 8px;
            border: 1px solid #fecaca; background: #fef2f2; color: #dc2626;
            font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500;
        }
        .clear-btn:hover { background: #fee2e2; }

        /* ====== Input Area ====== */
        .input-area {
            padding: 12px 24px 20px; display: flex; gap: 8px; align-items: center;
            border-top: 1px solid var(--border);
        }
        .input-area input {
            flex: 1; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border); background: #f9faf9;
            color: var(--text); font-size: 14px; outline: none;
            transition: all 0.2s; min-width: 0;
        }
        .input-area input::placeholder { color: #b0c0b0; }
        .input-area input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(75,180,45,0.10);
            background: #fff;
        }
        .input-area .icon-btn {
            width: 40px; height: 40px; border-radius: 10px;
            border: 1px solid var(--border); background: #f9faf9;
            color: var(--text-light); font-size: 17px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .input-area .icon-btn:hover { background: var(--green-pale); color: var(--green); border-color: var(--green); }
        .input-area .icon-btn.recording {
            background: #fee2e2; border-color: #ef4444; color: #ef4444;
            animation: pulse 1.2s infinite;
        }
        .input-area .send-btn {
            padding: 12px 28px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(75,180,45,0.25);
        }
        .input-area .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(75,180,45,0.35);
        }
        .input-area .send-btn:active { transform: scale(0.97); }
        .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #fileInput { display: none; }

        /* ====== Responsive ====== */
        @media (max-width: 600px) {
            .container { height: 100vh; border-radius: 0; }
            .header { padding: 12px 16px; }
            .header .logo-icon-img { height: 34px; }
            .chat-area { padding: 14px 16px; }
            .input-area { padding: 10px 16px 16px; }
            .toolbar { padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img class="logo-icon-img" src="/static/img/logo-icon.png" alt="博爱医药">
            <div class="title-group">
                <div class="title">博爱医药 AI 助手</div>
                <div class="subtitle">文件管理 · 数据库操作 · 智能对话</div>
            </div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </div>

        <!-- User Bar -->
        <div class="user-bar" id="userBar" style="display:none;">
            <div class="user-info">
                👤 <strong id="displayUsername"></strong>
                <span class="role-badge" id="displayRole"></span>
                <span style="font-size:12px;color:var(--text-light);" id="displayDept"></span>
            </div>
            <div class="bar-actions">
                <a class="btn-admin" id="btnAdmin" href="/admin/" style="display:none;">管理后台</a>
                <button class="btn-edit-profile" onclick="openProfileModal()">编辑资料</button>
                <button class="btn-logout" onclick="doLogout()">登出</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-hint">
                <img class="hint-logo" src="/static/img/logo-icon.png" alt="博爱医药">
                <div>输入消息或上传文件，AI 帮你管理文件和数据库</div>
            </div>
        </div>

        <!-- Upload Preview -->
        <div class="upload-preview" id="uploadPreview"></div>

        <!-- Toolbar -->
        <div class="toolbar">
            <label>模型:</label>
            <select id="modelSelect" onchange="selectModel(this.value)">
                <option value="">加载中...</option>
            </select>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
        </div>

        <!-- Input -->
        <div class="input-area">
            <input type="text" id="inputBox" placeholder="输入消息，如：帮我看看 data/files 里有哪些文件..." maxlength="2000" autofocus />
            <input type="file" id="fileInput" multiple onchange="handleFileUpload(this.files)" accept="*/*" />
            <button class="icon-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" title="上传文件">📎</button>
            <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发 送</button>
        </div>
    </div>

    <!-- Profile Edit Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <h3>编辑个人资料</h3>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="profileUsername" placeholder="2-20字符，支持中文、字母、数字、下划线">
            </div>
            <div class="form-group">
                <label>邮箱 <span class="optional">(选填)</span></label>
                <input type="email" id="profileEmail" placeholder="用于找回密码">
            </div>
            <div class="form-group">
                <label>新密码 <span class="optional">(不修改请留空)</span></label>
                <input type="password" id="profilePassword" placeholder="至少8位纯数字">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="profileConfirm" placeholder="再次输入新密码">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeProfileModal()">取消</button>
                <button class="btn-save" id="btnSaveProfile" onclick="saveProfile()">保存</button>
            </div>
            <div class="modal-success" id="profileMsg"></div>
            <div class="modal-error" id="profileErr"></div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const uploadPreview = document.getElementById('uploadPreview');
        const voiceBtn = document.getElementById('voiceBtn');
        const emptyHint = chatArea.querySelector('.empty-hint');
        let messageCount = 0;
        let selectedModel = '';
        let sessionId = '';
        let isRecording = false;
        let recognition = null;
        let pendingFiles = [];

        function _logClient(api, detail, ok) {
            const t = new Date().toISOString().slice(11,23);
            const s = ok ? 'OK' : 'FAIL';
            console.log(`[${t}] [${s}] ${api}`, detail);
        }

        async function loadUserInfo() {
            try {
                const resp = await fetch('/api/me');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.success && data.user) {
                        const user = data.user;
                        document.getElementById('displayUsername').textContent = user.username;
                        const roleBadge = document.getElementById('displayRole');
                        roleBadge.textContent = user.role_name;
                        roleBadge.className = 'role-badge role-' + user.role;
                        if (user.department_name) {
                            document.getElementById('displayDept').textContent = ' | ' + user.department_name;
                        }
                        document.getElementById('userBar').style.display = 'flex';
                        if (user.role === 'super_admin') {
                            document.getElementById('btnAdmin').style.display = 'inline';
                        }
                    } else {
                        window.location.href = '/login';
                    }
                } else if (resp.status === 401) {
                    window.location.href = '/login';
                }
            } catch (e) {
                console.error('获取用户信息失败', e);
            }
        }

        async function doLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        async function openProfileModal() {
            document.getElementById('profileErr').textContent = '';
            document.getElementById('profileMsg').textContent = '';
            document.getElementById('profilePassword').value = '';
            document.getElementById('profileConfirm').value = '';
            try {
                const resp = await fetch('/api/me');
                const data = await resp.json();
                if (data.success && data.user) {
                    document.getElementById('profileUsername').value = data.user.username || '';
                    document.getElementById('profileEmail').value = data.user.email || '';
                }
            } catch (e) {}
            document.getElementById('profileModal').classList.add('show');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('show');
        }

        async function saveProfile() {
            const username = document.getElementById('profileUsername').value.trim();
            const email = document.getElementById('profileEmail').value.trim() || null;
            const password = document.getElementById('profilePassword').value;
            const confirm = document.getElementById('profileConfirm').value;
            const errEl = document.getElementById('profileErr');
            const msgEl = document.getElementById('profileMsg');
            const btn = document.getElementById('btnSaveProfile');
            errEl.textContent = '';
            msgEl.textContent = '';

            if (password) {
                if (password.length < 8 || !/^\d+$/.test(password)) {
                    errEl.textContent = '密码需要至少8位纯数字'; return;
                }
                if (password !== confirm) {
                    errEl.textContent = '两次密码输入不一致'; return;
                }
            }

            btn.disabled = true; btn.textContent = '保存中...';
            try {
                const body = {};
                if (username) body.username = username;
                if (email !== undefined) body.email = email;
                if (password) body.password = password;
                const resp = await fetch('/api/me/update', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json();
                if (data.success) {
                    loadUserInfo();
                    msgEl.textContent = '资料已更新';
                    if (data.user) {
                        document.getElementById('profileUsername').value = data.user.username || '';
                        if (data.user.email !== undefined) {
                            document.getElementById('profileEmail').value = data.user.email || '';
                        }
                    }
                    document.getElementById('profilePassword').value = '';
                    document.getElementById('profileConfirm').value = '';
                } else {
                    errEl.textContent = data.error || '保存失败';
                }
            } catch (e) {
                errEl.textContent = '请求失败：' + (e.message || '网络错误');
            } finally {
                btn.disabled = false; btn.textContent = '保存';
            }
        }

        loadUserInfo();

        async function checkStatus() {
            try {
                const resp = await fetch('/api/status');
                if (resp.ok) {
                    const data = await resp.json();
                    statusDot.classList.remove('offline');
                    statusText.textContent = '在线';
                }
            } catch (e) {
                statusDot.classList.add('offline');
                statusText.textContent = '离线';
            }
        }

        function addMessage(type, text, extra) {
            if (emptyHint && messageCount === 0) emptyHint.remove();
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + type;
            const labelText = type === 'user' ? '你' : 'AI 助手';

            let extraHtml = '';
            if (extra && extra.tool_calls && extra.tool_calls.length > 0) {
                extraHtml = '<div class="extra">🔧 执行了 ' + extra.tool_calls.length + ' 个工具操作</div>';
            }

            msgDiv.innerHTML =
                '<div class="label">' + labelText + '</div>' +
                '<div class="bubble">' + escapeHtml(text) + '</div>' +
                extraHtml +
                '<div class="time">' + timeStr + '</div>';
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            messageCount++;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/\\n/g, '<br>');
        }

        async function sendMessage() {
            const text = inputBox.value.trim();
            if (!text && pendingFiles.length === 0) return;

            let fullText = text;

            if (pendingFiles.length > 0) {
                const excelFiles = pendingFiles.filter(f => {
                    const ext = f.name.split('.').pop().toLowerCase();
                    return ext === 'xlsx' || ext === 'xls';
                });
                const otherFiles = pendingFiles.filter(f => {
                    const ext = f.name.split('.').pop().toLowerCase();
                    return ext !== 'xlsx' && ext !== 'xls';
                });

                const uploadedPaths = [];

                // Excel 文件走专用接口
                for (const file of excelFiles) {
                    try {
                        addMessage('user', '📊 正在解析 Excel: ' + file.name + ' ...');
                        const formData = new FormData();
                        formData.append('file', file);
                        const resp = await fetch('/api/excel/upload', { method: 'POST', body: formData });
                        const data = await resp.json();
                        if (data.success) {
                            uploadedPaths.push('[Excel已导入: ' + file.name + ' | ' +
                                data.sheet_count + '个工作表 | ' + data.total_rows + '行数据 | 导入ID: ' + data.import_id + ']');
                        } else {
                            uploadedPaths.push('[Excel上传失败: ' + (data.error || '未知错误') + ']');
                        }
                    } catch (e) {
                        uploadedPaths.push('[Excel上传失败: ' + e.message + ']');
                    }
                }

                // 普通文件走原有接口
                for (const file of otherFiles) {
                    try {
                        const formData = new FormData();
                        formData.append('file', file);
                        const resp = await fetch('/api/upload', { method: 'POST', body: formData });
                        const data = await resp.json();
                        if (data.success) {
                            uploadedPaths.push(data.path);
                        } else {
                            uploadedPaths.push('[上传失败: ' + (data.error || '未知错误') + ']');
                        }
                    } catch (e) {
                        uploadedPaths.push('[上传失败: ' + e.message + ']');
                    }
                }

                if (uploadedPaths.length > 0) {
                    const fileInfo = '\\n\\n[已上传文件: ' + uploadedPaths.join(', ') + ']';
                    fullText = (text || '请帮我处理上传的文件') + fileInfo;
                }
                pendingFiles = [];
                uploadPreview.classList.remove('show');
                uploadPreview.textContent = '';
            }

            if (!fullText) return;

            addMessage('user', fullText);
            inputBox.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '处理中...';

            try {
                const resp = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: fullText, model: selectedModel, session_id: sessionId })
                });
                const data = await resp.json();
                _logClient('/api/command', {text: fullText.slice(0,50), replyLen: data.reply?.length, time: data.time}, resp.ok);
                if (data.session_id) sessionId = data.session_id;
                addMessage('server', data.reply, data);
            } catch (err) {
                _logClient('/api/command', {error: err.message, text: fullText.slice(0,50)}, false);
                addMessage('server', '错误：无法连接到服务器');
                statusDot.classList.add('offline');
                statusText.textContent = '离线';
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发 送';
                inputBox.focus();
            }
        }

        function handleFileUpload(files) {
            if (!files || files.length === 0) return;
            pendingFiles = Array.from(files);
            const names = pendingFiles.map(f => f.name).join(', ');
            const size = pendingFiles.reduce((s, f) => s + f.size, 0);
            const excelCount = pendingFiles.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return ext === 'xlsx' || ext === 'xls';
            }).length;
            const prefix = excelCount > 0 ? '📊 检测到 ' + excelCount + ' 个Excel文件，将自动解析入库 | ' : '📎 ';
            uploadPreview.textContent = prefix + '已选择: ' + names + ' (' + formatSize(size) + ')';
            uploadPreview.classList.add('show');
            if (!inputBox.value.trim()) {
                const prompt = excelCount > 0 ? '请帮我查询已导入的表格数据' : '请帮我处理上传的文件: ' + names;
                inputBox.value = prompt;
                inputBox.focus();
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function toggleVoice() {
            if (isRecording) { stopRecording(); return; }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('你的浏览器不支持语音识别。请使用 Chrome 或 Edge 浏览器。');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN'; recognition.interimResults = true; recognition.continuous = false;
            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.textContent = '⏹';
                inputBox.placeholder = '正在聆听...';
            };
            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                inputBox.value = transcript;
            };
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                stopRecording();
                if (event.error === 'not-allowed') alert('无法访问麦克风。请允许浏览器使用麦克风。');
            };
            recognition.onend = function() { stopRecording(); };
            try { recognition.start(); } catch (e) { alert('语音识别启动失败: ' + e.message); stopRecording(); }
        }

        function stopRecording() {
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.textContent = '🎤';
            inputBox.placeholder = '输入消息...';
            if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
        }

        async function clearChat() {
            try {
                await fetch('/api/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
            } catch (e) {}
            chatArea.innerHTML = '<div class="empty-hint"><img class="hint-logo" src="/static/img/logo-icon.png" alt="博爱医药"><div>对话已清空，输入消息开始新对话</div></div>';
            messageCount = 0;
        }

        inputBox.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function loadModels() {
            const sel = document.getElementById('modelSelect');
            try {
                const resp = await fetch('/api/models');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.models && data.models.length > 0) {
                        const currentVal = sel.value;
                        sel.innerHTML = '';
                        data.models.forEach(function(m, i) {
                            const opt = document.createElement('option');
                            opt.value = m; opt.text = m;
                            if ((i === 0 && !currentVal) || (currentVal && m === currentVal)) {
                                opt.selected = true; selectedModel = m;
                            }
                            sel.appendChild(opt);
                        });
                    } else {
                        sel.innerHTML = '<option value="">无可用模型</option>';
                    }
                }
            } catch (e) { sel.innerHTML = '<option value="">加载失败</option>'; }
        }

        function selectModel(val) { selectedModel = val; }

        document.addEventListener('paste', function(e) {
            const items = e.clipboardData.items;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    if (blob) {
                        pendingFiles = [blob];
                        uploadPreview.textContent = '📎 已粘贴: ' + blob.type + ' (' + formatSize(blob.size) + ')';
                        uploadPreview.classList.add('show');
                        if (!inputBox.value.trim()) { inputBox.value = '请帮我看看这张图片'; inputBox.focus(); }
                    }
                }
            }
        });

        const container = document.querySelector('.container');
        container.addEventListener('dragover', function(e) { e.preventDefault(); });
        container.addEventListener('drop', function(e) {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) handleFileUpload(e.dataTransfer.files);
        });

        loadModels();
        checkStatus();
        setInterval(checkStatus, 10000);
        inputBox.focus();
    </script>
</body>
</html>
